# 测试用例：语义错误集合
# 格式层面合法，但语义层面有错误
# 预期：validate_yaml check_level=semantic 应报告所有错误

id: semantic_errors_test
name: 语义错误测试
version: "1.0"

classes:
  # 错误1: 没有 first_citizen（缺少）
  - id: order
    name: 订单
    phase: alpha
    attributes:
      - id: order_no
        name: 订单号
        type: string
        required: true

  # 错误2: 第二个 first_citizen（重复）
  # 取消注释下面两行测试重复 first_citizen
  # - id: customer
  #   name: 客户
  #   first_citizen: true
  #   phase: alpha

  # 孤立类（无关系连接）用于测试 completeness warning
  - id: isolated_entity
    name: 孤立实体
    phase: alpha
    attributes:
      - id: name
        name: 名称
        type: string

relationships:
  # 错误3: from 引用不存在的 class
  - id: ghost_from
    name: 幽灵来源
    from: nonexistent_class
    to: order
    cardinality: many_to_one

  # 错误4: to 引用不存在的 class
  - id: ghost_to
    name: 幽灵目标
    from: order
    to: another_nonexistent
    cardinality: many_to_one

rules:
  # 错误5: condition.entity 引用不存在的 class
  - id: R01
    name: 无效规则
    phase: alpha
    severity: warning
    trigger:
      type: after_action
      source: [A01]
    condition:
      entity: nonexistent_entity
      expression: "status = 'ACTIVE'"
    action:
      type: set_field
      target: order.status
      value: PROCESSED

  # 错误6: trigger.source 引用不存在的 action
  - id: R02
    name: 无效触发源
    phase: alpha
    severity: info
    trigger:
      type: after_action
      source: [A99]
    condition:
      entity: order
      expression: "true"
    action:
      type: notify
      target: admin

actions:
  # 错误7: triggers_after 引用不存在的 rule
  - id: A01
    name: 处理订单
    phase: alpha
    params:
      - id: order_id
        name: 订单ID
        type: string
        required: true
    writes:
      - target: order
        operation: update
    triggers_after: [R99]
    permission:
      roles: [operator]
